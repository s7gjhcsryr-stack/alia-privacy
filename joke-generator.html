<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #999;
            font-size: 1em;
            margin-bottom: 40px;
        }
        
        .joke-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            padding: 30px;
            margin: 30px 0;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .joke-content {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.8;
        }
        
        .joke-type {
            font-size: 0.9em;
            color: #999;
            margin-top: 15px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .secondary-button {
            background: #e0e0e0;
            color: #333;
        }
        
        .secondary-button:hover {
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }
        
        .loading {
            display: none;
            color: #667eea;
            font-size: 1.1em;
            margin: 20px 0;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            display: none;
        }
        
        .error.active {
            display: block;
        }
        
        .category-filter {
            margin: 30px 0;
        }
        
        .category-filter label {
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }
        
        select {
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 1em;
            color: #333;
            cursor: pointer;
        }
        
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
        
        .back-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            margin-top: 20px;
            font-size: 0.95em;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get a random laugh with every click!</p>
        
        <div class="category-filter">
            <label for="category">Category:</label>
            <select id="category">
                <option value="">Any</option>
                <option value="general">General</option>
                <option value="programming">Programming</option>
                <option value="knock-knock">Knock-Knock</option>
            </select>
        </div>
        
        <div class="joke-box">
            <div class="joke-content" id="jokeContent">
                Click the button below to get started! 🎉
            </div>
            <div class="joke-type" id="jokeType"></div>
        </div>
        
        <div class="loading" id="loading">
            <span class="spinner"></span>
            <span>Loading your joke...</span>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="button-group">
            <button onclick="getJoke()">Get a Joke!</button>
            <button class="secondary-button" onclick="resetJoke()">Reset</button>
        </div>
        
        <footer>
            <p>Powered by <a href="https://jokeapi.dev/" target="_blank" style="color: #667eea;">JokeAPI</a></p>
            <a href="index.html" class="back-link">← Back to Privacy Policy</a>
        </footer>
    </div>

    <script>
        const API_URL = 'https://v2.jokeapi.dev/joke/';
        
        async function getJoke() {
            const category = document.getElementById('category').value;
            const selectedCategory = category || 'Any';
            const url = category ? `${API_URL}${category}` : `${API_URL}Any`;
            
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const jokeContentEl = document.getElementById('jokeContent');
            const jokeTypeEl = document.getElementById('jokeType');
            
            // Clear previous error
            errorEl.classList.remove('active');
            errorEl.textContent = '';
            
            // Show loading state
            loadingEl.classList.add('active');
            jokeContentEl.textContent = 'Loading...';
            
            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Hide loading state
                loadingEl.classList.remove('active');
                
                if (data.error) {
                    throw new Error(data.message || 'Failed to fetch joke');
                }
                
                // Display joke
                if (data.type === 'twopart') {
                    jokeContentEl.textContent = `${data.setup}\n\n${data.delivery}`;
                } else {
                    jokeContentEl.textContent = data.joke;
                }
                
                jokeTypeEl.textContent = `${data.type.charAt(0).toUpperCase() + data.type.slice(1)} Joke | Category: ${data.category}`;
                
            } catch (error) {
                loadingEl.classList.remove('active');
                errorEl.classList.add('active');
                errorEl.textContent = `⚠️ Error: ${error.message}. Please try again!`;
                jokeContentEl.textContent = 'Click "Get a Joke!" to try again';
                jokeTypeEl.textContent = '';
            }
        }
        
        function resetJoke() {
            document.getElementById('category').value = '';
            document.getElementById('jokeContent').textContent = 'Click the button below to get started! 🎉';
            document.getElementById('jokeType').textContent = '';
            document.getElementById('error').classList.remove('active');
            document.getElementById('loading').classList.remove('active');
        }
        
        // Load a joke on page load
        window.addEventListener('load', getJoke);
    </script>
</body>
</html>
